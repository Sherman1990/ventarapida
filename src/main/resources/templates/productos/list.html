<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Productos - VentaRápida</title>
    <style>
        body { font-family:'Segoe UI', Arial, sans-serif; background:#f4f7fb; margin:0; padding:32px; }
        .contenedor { max-width:1100px; margin:0 auto; background:#fff; border-radius:14px; padding:32px; box-shadow:0 4px 20px rgba(0,0,0,.06); }
        h1 { color:#0b1f3a; margin-bottom:4px; }
        .subtitulo { color:#8492a6; margin-bottom:24px; }
        .barra-superior { display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:8px; }
        .btn { display:inline-block; background:#1e6fe8; color:#fff; padding:10px 18px; border-radius:8px; text-decoration:none; font-weight:600; font-size:14px; border:none; cursor:pointer; }
        form.busqueda { display:flex; gap:8px; }
        form.busqueda input { padding:9px 12px; border:1px solid #d8dee8; border-radius:8px; font-size:14px; min-width:220px; }
        table { width:100%; border-collapse:collapse; margin-top:20px; }
        th, td { text-align:left; padding:12px 10px; border-bottom:1px solid #eef1f6; font-size:13px; }
        th { color:#5b6b82; font-size:11px; text-transform:uppercase; letter-spacing:.5px; }
        td a { color:#1e6fe8; text-decoration:none; margin-right:14px; font-weight:600; }
        td a.desactivar { color:#c0392b; }
        .badge-stock-bajo { background:#fdecec; color:#c0392b; padding:2px 8px; border-radius:6px; font-size:11px; font-weight:700; margin-left:6px; }
        .badge-inactivo { background:#eee; color:#888; padding:2px 8px; border-radius:6px; font-size:11px; }
        .vacio { color:#8492a6; padding:24px 0; text-align:center; }
        .volver { display:inline-block; margin-bottom:16px; color:#1e6fe8; text-decoration:none; font-size:14px; }
    </style>
</head>
<body>
    <div class="contenedor">
        <a class="volver" th:href="@{/}">&larr; Volver al inicio</a>
        <h1>Productos</h1>
        <p class="subtitulo">Catálogo de productos de TechStore Perú</p>

        <div class="barra-superior">
            <a class="btn" th:href="@{/productos/nuevo}">+ Nuevo producto</a>
			<a th:href="@{/productos/reporte-inventario}" class="btn btn-danger" target="_blank" style="margin-left: 10px;">
			    Descargar Inventario PDF
			</a>
            <form class="busqueda" th:action="@{/productos/buscar}" method="get">
                <input type="text" name="texto" placeholder="Buscar por nombre..." th:value="${textoBusqueda}">
                <button class="btn" type="submit">Buscar</button>
            </form>
        </div>

        <table>
            <thead>
                <tr><th>Código</th><th>Nombre</th><th>Categoría</th><th>Proveedor</th><th>Precio</th><th>Stock</th><th>Acciones</th></tr>
            </thead>
            <tbody>
                <tr th:each="p : ${productos}">
                    <td th:text="${p.codigo}"></td>
                    <td th:text="${p.nombre}"></td>
                    <td th:text="${p.categoria != null ? p.categoria.nombre : '-'}"></td>
                    <td th:text="${p.proveedor != null ? p.proveedor.razonSocial : '-'}"></td>
                    <td th:text="'S/ ' + ${p.precio}"></td>
                    <td>
                        <span th:text="${p.stock}"></span>
                        <span class="badge-stock-bajo" th:if="${p.necesitaReabastecimiento()}">Stock bajo</span>
                        <span class="badge-inactivo" th:unless="${p.activo}">Inactivo</span>
                    </td>
                    <td>
                        <a th:href="@{/productos/editar/{id}(id=${p.idProducto})}">Editar</a>
                        <a class="desactivar" th:if="${p.activo}" th:href="@{/productos/desactivar/{id}(id=${p.idProducto})}"
                           onclick="return confirm('¿Desactivar este producto?');">Desactivar</a>
                    </td>
                </tr>
            </tbody>
        </table>

        <p class="vacio" th:if="${#lists.isEmpty(productos)}">No se encontraron productos.</p>
    </div>
</body>
</html>
