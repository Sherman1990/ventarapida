<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Recuperar contraseña - VentaRápida</title>
    <style>
        body { font-family:'Segoe UI', Arial, sans-serif; background:#eef3fb; margin:0; padding:48px 20px; }
        .contenedor { max-width:420px; margin:0 auto; background:#fff; border-radius:16px; padding:36px; box-shadow:0 4px 24px rgba(11,31,58,.08); }
        h1 { color:#0b1f3a; font-size:22px; margin-bottom:4px; }
        .subtitulo { color:#8492a6; font-size:13px; margin-bottom:24px; }
        label { display:block; font-size:13px; font-weight:600; color:#0b1f3a; margin-bottom:6px; }
        input { width:100%; padding:10px 12px; border:1px solid #d8dee8; border-radius:8px; font-size:14px; margin-bottom:16px; box-sizing:border-box; }
        .btn { width:100%; background:#1e6fe8; color:#fff; border:none; padding:12px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; }
        .volver { display:inline-block; margin-bottom:16px; color:#1e6fe8; text-decoration:none; font-size:14px; }
        .error { background:#fdecec; color:#c0392b; padding:10px 14px; border-radius:8px; font-size:13px; margin-bottom:18px; }
        .ok { background:#eafaf0; color:#1e8449; padding:10px 14px; border-radius:8px; font-size:13px; margin-bottom:18px; }
    </style>
</head>
<body>
    <div class="contenedor">
        <a class="volver" th:href="@{/login}">&larr; Volver al login</a>
        <h1>Recuperar contraseña</h1>
        <p class="subtitulo">Verifica tu identidad para continuar</p>

        <p class="error" th:if="${error}" th:text="${error}"></p>

        <!-- Paso 1: verificación (solo se muestra si AÚN no se verificó) -->
        <form th:if="${usernameVerificado == null}" th:action="@{/recuperar-password/verificar}" method="post">
            <label>Username</label>
            <input type="text" name="username" required>

            <label>Email registrado</label>
            <input type="email" name="email" required>

            <button type="submit" class="btn">Verificar identidad</button>
        </form>

        <!-- Paso 2: nueva contraseña (solo se muestra DESPUÉS de verificar) -->
        <div th:if="${usernameVerificado != null}">
            <p class="ok">Identidad verificada para: <strong th:text="${usernameVerificado}"></strong></p>
            <form th:action="@{/recuperar-password/cambiar}" method="post">
                <input type="hidden" name="username" th:value="${usernameVerificado}">

                <label>Nueva contraseña</label>
                <input type="password" name="nuevaPassword" minlength="6" required>

                <label>Confirmar nueva contraseña</label>
                <input type="password" name="confirmarPassword" minlength="6" required>

                <button type="submit" class="btn">Cambiar contraseña</button>
            </form>
        </div>
    </div>
</body>
</html>
