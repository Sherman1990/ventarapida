<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ventas - VentaRápida</title>
    <style>
        body { font-family:'Segoe UI', Arial, sans-serif; background:#f4f7fb; margin:0; padding:32px; }
        .contenedor { max-width:950px; margin:0 auto; background:#fff; border-radius:14px; padding:32px; box-shadow:0 4px 20px rgba(0,0,0,.06); }
        h1 { color:#0b1f3a; margin-bottom:4px; }
        .subtitulo { color:#8492a6; margin-bottom:24px; }
        .btn { display:inline-block; background:#1e6fe8; color:#fff; padding:10px 18px; border-radius:8px; text-decoration:none; font-weight:600; font-size:14px; }
        table { width:100%; border-collapse:collapse; margin-top:20px; }
        th, td { text-align:left; padding:12px 10px; border-bottom:1px solid #eef1f6; font-size:13px; }
        th { color:#5b6b82; font-size:11px; text-transform:uppercase; }
        td a { color:#1e6fe8; text-decoration:none; font-weight:600; margin-right:14px; }
        td a.pdf { color:#0b1f3a; }
        .badge-completada { background:#eaf6ec; color:#1e8449; padding:3px 10px; border-radius:6px; font-size:11px; font-weight:700; }
        .vacio { color:#8492a6; padding:24px 0; text-align:center; }
        .volver { display:inline-block; margin-bottom:16px; color:#1e6fe8; text-decoration:none; font-size:14px; }
    </style>
</head>
<body>
    <div class="contenedor">
        <a class="volver" th:href="@{/}">&larr; Volver al inicio</a>
        <h1>Ventas</h1>
        <p class="subtitulo">Historial de ventas registradas</p>

        <a class="btn" th:href="@{/ventas/nueva}">+ Nueva venta</a>

        <table>
            <thead>
                <tr><th>N° Venta</th><th>Fecha</th><th>Cliente</th><th>Vendedor</th><th>Total</th><th>Estado</th><th>Acciones</th></tr>
            </thead>
            <tbody>
                <tr th:each="v : ${ventas}">
                    <td th:text="${v.idVenta}"></td>
                    <td th:text="${v.fecha}"></td>
                    <td th:text="${v.cliente.nombreCompleto}"></td>
                    <td th:text="${v.usuario.nombre}"></td>
                    <td th:text="'S/ ' + ${v.total}"></td>
                    <td><span class="badge-completada" th:text="${v.estado}"></span></td>
                    <td>
                        <a th:href="@{/ventas/{id}(id=${v.idVenta})}">Ver detalle</a>
                        <a class="pdf" th:href="@{/ventas/{id}/pdf(id=${v.idVenta})}" target="_blank">PDF</a>
                    </td>
                </tr>
            </tbody>
        </table>

        <p class="vacio" th:if="${#lists.isEmpty(ventas)}">Todavía no se ha registrado ninguna venta.</p>
    </div>
</body>
</html>
