<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Usuarios - VentaRápida</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background:#f4f7fb; margin:0; padding:32px; }
        .contenedor { max-width:950px; margin:0 auto; background:#fff; border-radius:14px; padding:32px; box-shadow:0 4px 20px rgba(0,0,0,.06); }
        h1 { color:#0b1f3a; margin-bottom:4px; }
        .subtitulo { color:#8492a6; margin-bottom:24px; }
        .btn { display:inline-block; background:#1e6fe8; color:#fff; padding:10px 18px; border-radius:8px; text-decoration:none; font-weight:600; font-size:14px; }
        table { width:100%; border-collapse:collapse; margin-top:20px; }
        th, td { text-align:left; padding:12px 10px; border-bottom:1px solid #eef1f6; font-size:13px; }
        th { color:#5b6b82; font-size:11px; text-transform:uppercase; letter-spacing:.5px; }
        td a { color:#1e6fe8; text-decoration:none; margin-right:14px; font-weight:600; }
        td a.eliminar { color:#c0392b; }
        .badge-rol { padding:3px 10px; border-radius:6px; font-size:11px; font-weight:700; }
        .badge-admin { background:#fdecec; color:#c0392b; }
        .badge-vendedor { background:#e6f0fd; color:#1e6fe8; }
        .badge-inactivo { background:#eee; color:#888; padding:2px 8px; border-radius:6px; font-size:11px; margin-left:6px; }
        .vacio { color:#8492a6; padding:24px 0; text-align:center; }
        .volver { display:inline-block; margin-bottom:16px; color:#1e6fe8; text-decoration:none; font-size:14px; }
    </style>
</head>
<body>
    <div class="contenedor">
        <a class="volver" th:href="@{/}">&larr; Volver al inicio</a>
        <h1>Usuarios</h1>
        <p class="subtitulo">Gestión de usuarios del sistema (solo ADMIN)</p>

        <a class="btn" th:href="@{/usuarios/nuevo}">+ Nuevo usuario</a>

        <table>
            <thead>
                <tr><th>Username</th><th>Nombre</th><th>Email</th><th>Rol</th><th>Acciones</th></tr>
            </thead>
            <tbody>
                <tr th:each="u : ${usuarios}">
                    <td th:text="${u.username}"></td>
                    <td th:text="${u.nombre}"></td>
                    <td th:text="${u.email}"></td>
                    <td>
                        <span class="badge-rol" th:classappend="${u.rol == 'ADMIN'} ? 'badge-admin' : 'badge-vendedor'"
                              th:text="${u.rol}"></span>
                        <span class="badge-inactivo" th:unless="${u.activo}">Inactivo</span>
                    </td>
                    <td>
                        <a th:href="@{/usuarios/editar/{id}(id=${u.idUsuario})}">Editar</a>
                        <a class="eliminar" th:href="@{/usuarios/eliminar/{id}(id=${u.idUsuario})}"
                           onclick="return confirm('¿Eliminar este usuario?');">Eliminar</a>
                    </td>
                </tr>
            </tbody>
        </table>

        <p class="vacio" th:if="${#lists.isEmpty(usuarios)}">No hay usuarios registrados todavía.</p>
    </div>
</body>
</html>
