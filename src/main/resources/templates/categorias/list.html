<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Categorías - VentaRápida</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background:#f4f7fb; margin:0; padding:32px; }
        .contenedor { max-width:900px; margin:0 auto; background:#fff; border-radius:14px; padding:32px; box-shadow:0 4px 20px rgba(0,0,0,.06); }
        h1 { color:#0b1f3a; margin-bottom:4px; }
        .subtitulo { color:#8492a6; margin-bottom:24px; }
        .btn { display:inline-block; background:#1e6fe8; color:#fff; padding:10px 18px; border-radius:8px; text-decoration:none; font-weight:600; font-size:14px; }
        table { width:100%; border-collapse:collapse; margin-top:20px; }
        th, td { text-align:left; padding:12px 10px; border-bottom:1px solid #eef1f6; font-size:14px; }
        th { color:#5b6b82; font-size:12px; text-transform:uppercase; letter-spacing:.5px; }
        td a { color:#1e6fe8; text-decoration:none; margin-right:14px; font-weight:600; }
        td a.eliminar { color:#c0392b; }
        .vacio { color:#8492a6; padding:24px 0; text-align:center; }
        .volver { display:inline-block; margin-bottom:16px; color:#1e6fe8; text-decoration:none; font-size:14px; }
    </style>
</head>
<body>
    <div class="contenedor">
        <a class="volver" th:href="@{/}">&larr; Volver al inicio</a>
        <h1>Categorías</h1>
        <p class="subtitulo">Gestiona las categorías de productos de TechStore Perú</p>

        <a class="btn" th:href="@{/categorias/nuevo}">+ Nueva categoría</a>

        <table>
            <thead>
                <tr><th>ID</th><th>Nombre</th><th>Descripción</th><th>Acciones</th></tr>
            </thead>
            <tbody>
                <tr th:each="cat : ${categorias}">
                    <td th:text="${cat.idCategoria}"></td>
                    <td th:text="${cat.nombre}"></td>
                    <td th:text="${cat.descripcion}"></td>
                    <td>
                        <a th:href="@{/categorias/editar/{id}(id=${cat.idCategoria})}">Editar</a>
                        <a class="eliminar" th:href="@{/categorias/eliminar/{id}(id=${cat.idCategoria})}"
                           onclick="return confirm('¿Eliminar esta categoría?');">Eliminar</a>
                    </td>
                </tr>
            </tbody>
        </table>

        <p class="vacio" th:if="${#lists.isEmpty(categorias)}">No hay categorías registradas todavía.</p>
    </div>
</body>
</html>
