<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Categorías - VentaRápida</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing:border-box; }
        body { font-family:'Plus Jakarta Sans', Arial, sans-serif; background:#eef2f8; margin:0; padding:40px; min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .contenedor { width:100%; max-width:920px; margin:0 auto; background:#fff; border-radius:18px; padding:36px 40px; box-shadow:0 18px 50px rgba(11,31,58,.10); }
        .volver { display:inline-flex; align-items:center; gap:6px; color:#1e6fe8; text-decoration:none; font-size:13.5px; font-weight:600; margin-bottom:18px; }
        .banner { display:block; width:100%; height:auto; border-radius:12px; margin-bottom:22px; }
        .cabecera { display:flex; align-items:flex-end; justify-content:space-between; gap:20px; flex-wrap:wrap; }
        .eyebrow { font-family:'IBM Plex Mono', monospace; font-size:11px; font-weight:500; letter-spacing:.14em; text-transform:uppercase; color:#3b82f6; }
        .subtitulo { color:#6b7789; font-size:14px; margin:6px 0 0; }
        .btn { display:inline-flex; align-items:center; gap:8px; background:linear-gradient(135deg,#3b8bf5 0%,#1e6fe8 100%); color:#fff; padding:12px 20px; border-radius:10px; text-decoration:none; font-weight:700; font-size:14px; box-shadow:0 8px 18px rgba(30,111,232,.30); transition:background .18s, box-shadow .18s, transform .18s; }
        .btn:hover { background:linear-gradient(135deg,#1556c0 0%,#0b3aa0 100%); box-shadow:0 12px 26px rgba(11,58,160,.45); transform:translateY(-1px); }
        table { width:100%; border-collapse:collapse; margin-top:28px; }
        th { text-align:left; padding:11px 12px; border-bottom:2px solid #eef1f6; color:#8492a6; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; }
        th.acciones { text-align:right; }
        td { padding:14px 12px; border-bottom:1px solid #f0f3f8; font-size:14px; }
        tbody tr { transition:background .12s; }
        tbody tr:hover { background:#f7f9fc; }
        .badge { font-family:'IBM Plex Mono', monospace; font-size:12px; font-weight:500; color:#46526a; background:#eef2f8; padding:3px 9px; border-radius:6px; }
        .nombre { font-weight:700; color:#0b1f3a; }
        .desc { color:#6b7789; }
        .acciones { text-align:right; white-space:nowrap; }
        .accion { display:inline-flex; align-items:center; gap:5px; text-decoration:none; font-weight:700; font-size:13px; padding:6px 10px; border-radius:8px; margin-left:4px; transition:background .15s; cursor:pointer; }
        .editar { color:#1e6fe8; }
        .editar:hover { background:#eaf1fd; }
        .eliminar { color:#c0392b; background:none; border:none; font-family:inherit; }
        .eliminar:hover { background:#fdecec; }
        .vacio { color:#8492a6; padding:28px 0; text-align:center; }

        /* ===== Modal ===== */
        .modal-overlay { position:fixed; inset:0; background:rgba(11,31,58,.55); backdrop-filter:blur(2px); display:none; align-items:center; justify-content:center; z-index:50; padding:20px; }
        .modal-overlay.activo { display:flex; }
        .modal { width:100%; max-width:420px; background:#fff; border-radius:16px; box-shadow:0 24px 60px rgba(11,31,58,.30); padding:30px 28px; text-align:center; animation:modalIn .18s ease; }
        @keyframes modalIn { from { opacity:0; transform:translateY(12px) scale(.98); } to { opacity:1; transform:none; } }
        .modal-icono { width:56px; height:56px; margin:0 auto 18px; border-radius:50%; background:#fdecec; display:flex; align-items:center; justify-content:center; }
        .modal h2 { margin:0 0 8px; font-size:20px; font-weight:800; color:#0b1f3a; letter-spacing:-.01em; }
        .modal p { margin:0 0 26px; font-size:14px; line-height:1.55; color:#6b7789; }
        .modal p strong { color:#0b1f3a; }
        .modal-acciones { display:flex; gap:12px; }
        .modal-acciones button, .modal-acciones a { flex:1; border:none; padding:12px 18px; border-radius:10px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; }
        .modal-cancelar { background:#f1f4f9; color:#46526a; }
        .modal-cancelar:hover { background:#e6ebf3; }
        .modal-confirmar { background:#dc2626; color:#fff; box-shadow:0 8px 18px rgba(220,38,38,.32); }
        .modal-confirmar:hover { background:#b91c1c; }
    </style>
</head>
<body>
    <div class="contenedor">
        <a class="volver" th:href="@{/}">&larr; Volver al inicio</a>

        <img class="banner" th:src="@{/img/bannercategorias.png}" alt="Categorías">

        <div class="cabecera">
            <div>
                <span class="eyebrow">TechStore Perú</span>
                <p class="subtitulo">Gestiona las categorías de productos de tu tienda.</p>
            </div>
            <a class="btn" th:href="@{/categorias/nuevo}">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Nueva categoría
            </a>
        </div>

        <table>
            <thead>
                <tr>
                    <th style="width:70px;">ID</th>
                    <th>Nombre</th>
                    <th>Descripción</th>
                    <th class="acciones" style="width:140px;">Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="cat : ${categorias}">
                    <td><span class="badge" th:text="${cat.idCategoria}"></span></td>
                    <td class="nombre" th:text="${cat.nombre}"></td>
                    <td class="desc" th:text="${cat.descripcion}"></td>
                    <td class="acciones">
                        <a class="accion editar" th:href="@{/categorias/editar/{id}(id=${cat.idCategoria})}">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                            Editar
                        </a>
                        <button type="button" class="accion eliminar"
                                th:attr="data-id=${cat.idCategoria},data-nombre=${cat.nombre}"
                                onclick="abrirModalEliminar(this)">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                            Eliminar
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>

        <p class="vacio" th:if="${#lists.isEmpty(categorias)}">No hay categorías registradas todavía.</p>
    </div>

    <!-- ===== Modal de confirmación ===== -->
    <div class="modal-overlay" id="modalEliminar" onclick="cerrarModalEliminar(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-icono">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#c0392b" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
            </div>
            <h2>Eliminar categoría</h2>
            <p>¿Seguro que deseas eliminar <strong id="modalNombre"></strong>? Esta acción no se puede deshacer.</p>
            <div class="modal-acciones">
                <button type="button" class="modal-cancelar" onclick="cerrarModalEliminar()">Cancelar</button>
                <a id="modalConfirmar" class="modal-confirmar" href="#" style="display:inline-flex; align-items:center; justify-content:center; text-decoration:none;">Sí, eliminar</a>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        var BASE_ELIMINAR = /*[[@{/categorias/eliminar/}]]*/ '/categorias/eliminar/';

        function abrirModalEliminar(btn) {
            var id = btn.getAttribute('data-id');
            var nombre = btn.getAttribute('data-nombre');
            document.getElementById('modalNombre').textContent = nombre;
            document.getElementById('modalConfirmar').setAttribute('href', BASE_ELIMINAR + id);
            document.getElementById('modalEliminar').classList.add('activo');
        }
        function cerrarModalEliminar(e) {
            document.getElementById('modalEliminar').classList.remove('activo');
        }
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') cerrarModalEliminar();
        });
    </script>
</body>
</html>
